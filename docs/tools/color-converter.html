<script>
function show(t,m){var d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove();},2000);}
function convert(){
var s=document.getElementById('colorIn').value.trim();if(!s)return;
var d=document.createElement('div');d.style.color=s;document.body.appendChild(d);
var c=getComputedStyle(d).color;document.body.removeChild(d);
if(!c||c==='rgba(0, 0, 0, 0)'){document.getElementById('results').innerHTML='<p style="color:var(--red);grid-column:1/-1;">无法解析颜色值</p>';return;}
var m=c.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);if(!m){document.getElementById('results').innerHTML='<p style="color:var(--red);grid-column:1/-1;">解析失败</p>';return;}
var r=parseInt(m[1]),g=parseInt(m[2]),b=parseInt(m[3]);
var hex='#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0');}).join('');
var rgb='rgb('+r+', '+g+', '+b+')';
var rr=r/255,gg=g/255,bb=b/255,max=Math.max(rr,gg,bb),min=Math.min(rr,gg,bb);
var h=0,sat=0,l=(max+min)/2;
if(max!==min){var diff=max-min;sat=l>0.5?diff/(2-max-min):diff/(max+min);
switch(max){case rr:h=((gg-bb)/diff+(gg<bb?6:0))/6;break;case gg:h=((bb-rr)/diff+2)/6;break;case bb:h=((rr-gg)/diff+4)/6;break;}}
var hsl='hsl('+Math.round(h*360)+', '+Math.round(sat*100)+'%, '+Math.round(l*100)+'%)';
document.getElementById('preview').style.backgroundColor=rgb;
document.getElementById('results').innerHTML=
'<div class="res-item" onclick="copy(\''+hex+'\')"><div class="lbl">HEX</div><div class="val">'+hex+'</div></div>'+
'<div class="res-item" onclick="copy(\''+rgb+'\')"><div class="lbl">RGB</div><div class="val">'+rgb+'</div></div>'+
'<div class="res-item" onclick="copy(\''+hsl+'\')"><div class="lbl">HSL</div><div class="val">'+hsl+'</div></div>'+
'<div class="res-item"><div class="lbl">通道</div><div class="val">R:'+r+' G:'+g+' B:'+b+'</div></div>';
}
function copy(t){navigator.clipboard.writeText(t).then(function(){show('success','已复制');});}
document.getElementById('colorIn').value='#3b82f6';convert();
</script>
