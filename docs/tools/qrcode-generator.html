function gen(){var s=document.getElementById('qrInput').value.trim();if(!s){show('error','请输入文本或链接');return;}var sz=parseInt(document.getElementById('qrSize').value)||256;var w=document.getElementById('qrWrap');w.innerHTML='';var c=document.createElement('canvas');QRCode.toCanvas(c,s,{width:sz,margin:2},function(e){if(e){show('error','生成失败');return;}w.appendChild(c);currentQR=c.toDataURL('image/png');});}

</script>
