<script>
function show(t,m){var d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove();},2000);}
function encode(){var s=document.getElementById('urlInput').value;if(!s)return;document.getElementById('urlOutput').textContent=encodeURIComponent(s);}
function decode(){var s=document.getElementById('urlInput').value.trim();if(!s)return;try{document.getElementById('urlOutput').textContent=decodeURIComponent(s);}catch(e){document.getElementById('urlOutput').textContent='解码失败: '+e.message;document.getElementById('urlOutput').style.color='var(--red)';}}
</script>
