<script>
function show(t,m){var d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove();},2000);}
function generateOne(){
var l=parseInt(document.getElementById('pwLen').value)||16;
var u='ABCDEFGHIJKLMNOPQRSTUVWXYZ',lo='abcdefghijklmnopqrstuvwxyz',d='0123456789',s='!@#$%^&*()_+-=[]{}|;:,.<>?';
var ch='';
if(document.getElementById('pwUpper').checked)ch+=u;
if(document.getElementById('pwLower').checked)ch+=lo;
if(document.getElementById('pwDigits').checked)ch+=d;
if(document.getElementById('pwSymbols').checked)ch+=s;
if(!ch){show('error','请至少选择一种字符类型');return null;}
var a=new Uint32Array(l);crypto.getRandomValues(a);
var p='';for(var i=0;i<l;i++)p+=ch[a[i]%ch.length];
var f=p.split('');
var pos=0;
if(document.getElementById('pwUpper').checked&&!/[A-Z]/.test(f.join('')))f[pos++]=u[a[pos]%26];
if(document.getElementById('pwLower').checked&&!/[a-z]/.test(f.join('')))f[pos++]=lo[a[pos]%26];
if(document.getElementById('pwDigits').checked&&!/[0-9]/.test(f.join('')))f[pos++]=d[a[pos]%10];
if(document.getElementById('pwSymbols').checked&&!/[^A-Za-z0-9]/.test(f.join('')))f[pos++]=s[a[pos]%s.length];
for(var i=f.length-1;i>0;i--){var j=a[i]%(i+1);var t=f[i];f[i]=f[j];f[j]=t;}
return f.join('');
}
function gen(){var p=generateOne();if(p)document.getElementById('pwOut').textContent=p;}
function gen5(){var pws=[];for(var i=0;i<5;i++){var p=generateOne();if(p)pws.push(p);}
document.getElementById('pwOut').textContent=pws.join('\n');}
</script>
