*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.header .logo{font-size:20px;font-weight:700;color:var(--primary);text-decoration:none;}

.hero h1{font-size:28px;font-weight:800;color:var(--text);}

.btn{padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-h);}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.result-box{margin-top:12px;padding:16px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);min-height:60px;font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:13px;word-break:break-all;white-space:pre-wrap;max-height:400px;overflow-y:auto;}
.breadcrumb{margin-bottom:16px;font-size:13px;color:var(--text2);}
.breadcrumb a{color:var(--primary);text-decoration:none;}

.related .links a:hover{border-color:var(--primary);color:var(--primary);}
.footer{text-align:center;padding:32px 20px;color:var(--text2);font-size:12px;border-top:1px solid var(--border);margin-top:32px;}
.footer a{color:var(--primary);text-decoration:none;}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:var(--radius-sm);color:#fff;font-size:14px;z-index:9999;animation:slideIn .3s;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
@keyframes slideIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
@media(max-width:640px){.hero h1{font-size:22px;}}

<header class="header">
<a href="/toolbox-pro/" class="logo">🔧 ToolBox Pro</a>

</header>
<div class="container">
<div class="breadcrumb"><a href="/toolbox-pro/">首页</a> / JSON在线格式化</div>
<div class="hero">
<h1>JSON 在线格式化 / 验证</h1>
<p>粘贴JSON字符串，一键格式化美化或压缩。自动检测JSON格式是否正确。纯浏览器本地处理，数据安全不泄露。</p>
</div>
<div class="card">
<textarea id="jsonInput" placeholder='粘贴JSON字符串，如：{"name":"ToolBox","version":"1.0"}'></textarea>
<div class="btn-row">
<button class="btn btn-primary" onclick="fmt()">格式化</button>
<button class="btn btn-secondary" onclick="compress()">压缩</button>
<button class="btn btn-secondary" onclick="validate()">验证</button>
<button class="btn btn-secondary" onclick="document.getElementById('jsonInput').value='';document.getElementById('output').textContent='';">清空</button>
</div>

<script>
function show(t,m){const d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove();},2500);}
function fmt(){const s=document.getElementById('jsonInput').value.trim();if(!s){show('error','请先输入JSON内容');return;}try{document.getElementById('output').textContent=JSON.stringify(JSON.parse(s),null,2);document.getElementById('output').style.color='var(--green)';}catch(e){document.getElementById('output').textContent='JSON解析错误: '+e.message;document.getElementById('output').style.color='var(--red)';}}
function compress(){const s=document.getElementById('jsonInput').value.trim();if(!s)return;try{document.getElementById('output').textContent=JSON.stringify(JSON.parse(s));document.getElementById('output').style.color='var(--text)';}catch(e){document.getElementById('output').textContent='错误: '+e.message;document.getElementById('output').style.color='var(--red)';}}
function validate(){const s=document.getElementById('jsonInput').value.trim();if(!s){show('error','请先输入JSON内容');return;}try{JSON.parse(s);document.getElementById('output').textContent='✓ JSON格式正确';document.getElementById('output').style.color='var(--green)';}catch(e){document.getElementById('output').textContent='✗ JSON格式错误: '+e.message;document.getElementById('output').style.color='var(--red)';}}
</script>
