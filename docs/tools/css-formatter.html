<script>
function show(t,m){var d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove();},2000);}
function fmt(){
var s=document.getElementById('cssIn').value.trim();if(!s)return;
try{
s=s.replace(/\/\*[\s\S]*?\*\//g,'');
s=s.replace(/\s*{\s*/g,' {\n  ');
s=s.replace(/\s*}\s*/g,'\n}\n');
s=s.replace(/;\s*/g,';\n  ');
s=s.replace(/\n\s*\n/g,'\n');
var lines=s.split('\n'),indent=0,result=[];
for(var i=0;i<lines.length;i++){
var line=lines[i].trim();if(!line)continue;
if(line==='}')indent=Math.max(0,indent-1);
result.push('  '.repeat(indent)+line);
if(line.endsWith('{'))indent++;
}
document.getElementById('cssOut').textContent=result.join('\n');
}catch(e){document.getElementById('cssOut').textContent='格式化失败: '+e.message;}
}
function compress(){
var s=document.getElementById('cssIn').value;if(!s)return;
s=s.replace(/\/\*[\s\S]*?\*\//g,'');
s=s.replace(/\s+/g,' ');
s=s.replace(/\s*{\s*/g,'{');
s=s.replace(/\s*}\s*/g,'}');
s=s.replace(/\s*;\s*/g,';');
s=s.replace(/\s*:\s*/g,':');
s=s.replace(/\s*,\s*/g,',');
s=s.replace(/;}/g,'}');
document.getElementById('cssOut').textContent=s.trim();
}
</script>
