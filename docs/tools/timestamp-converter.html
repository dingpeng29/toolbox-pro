<script>
function updateLive(){var n=Math.floor(Date.now()/1000);var ms=Date.now();var d=new Date();document.getElementById('liveTs').textContent=n;document.getElementById('liveDate').textContent='毫秒戳: '+ms+' | '+d.toLocaleString('zh-CN')+' | UTC: '+d.toUTCString();}
updateLive();setInterval(updateLive,1000);
function tsToDate(){var s=document.getElementById('tsInput').value.trim();if(!s)return;var u=document.getElementById('tsUnit').value;var t=u==='s'?parseInt(s)*1000:parseInt(s);if(isNaN(t)){document.getElementById('tsOutput').textContent='请输入有效的时间戳数字';return;}var d=new Date(t);document.getElementById('tsOutput').textContent=d.toLocaleString('zh-CN')+'\nUTC: '+d.toUTCString()+'\nISO: '+d.toISOString();}
function dateToTs(){var s=document.getElementById('dateInput').value.trim();if(!s)return;var d=new Date(s);if(isNaN(d.getTime())){document.getElementById('dateOutput').textContent='无法解析日期，请使用格式如 2024-01-01 12:00:00';return;}document.getElementById('dateOutput').textContent='时间戳(秒): '+Math.floor(d.getTime()/1000)+'\n时间戳(毫秒): '+d.getTime();}
</script>
