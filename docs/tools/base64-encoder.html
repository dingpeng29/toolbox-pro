<script>
function show(t,m){var d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove();},2500);}
function encode(){var s=document.getElementById('b64Input').value;if(!s)return;try{document.getElementById('output').textContent=btoa(unescape(encodeURIComponent(s)));document.getElementById('output').style.color='var(--text)';}catch(e){document.getElementById('output').textContent='编码失败: '+e.message;document.getElementById('output').style.color='var(--red)';}}
function decode(){var s=document.getElementById('b64Input').value.trim();if(!s)return;try{document.getElementById('output').textContent=decodeURIComponent(escape(atob(s)));document.getElementById('output').style.color='var(--text)';}catch(e){document.getElementById('output').textContent='解码失败，请检查输入是否为有效Base64';document.getElementById('output').style.color='var(--red)';}}
</script>
