<div class="card">
<textarea id="jwtIn" placeholder="粘贴JWT Token...&#10;例如: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c" oninput="decode()"></textarea>
<div class="btn-row">
<button class="btn btn-primary" onclick="decode()">解码 JWT</button>

<script>
function b64urlDecode(s){
s=s.replace(/-/g,'+').replace(/_/g,'/');
while(s.length%4)s+='=';
try{return atob(s);}catch(e){return null;}
}
function jsonFmt(s){try{return JSON.stringify(JSON.parse(s),null,2);}catch(e){return s;}}

function decode(){
var v=document.getElementById('jwtIn').value.trim();
var out=document.getElementById('output');
if(!v){out.innerHTML='';return;}

var parts=v.split('.');
if(parts.length!==3){out.innerHTML='<div class="error-box">不是有效的JWT Token — JWT格式应为 header.payload.signature (三段，以 . 分隔)</div>';return;}

var headerStr=b64urlDecode(parts[0]);
var payloadStr=b64urlDecode(parts[1]);
var sig=parts[2];

if(!headerStr||!payloadStr){out.innerHTML='<div class="error-box">Base64解码失败 — Token格式可能已损坏</div>';return;}

var header=headerStr,payload=payloadStr;
var hFmt=jsonFmt(header),pFmt=jsonFmt(payload);

var html='';

html+='<div class="section"><div class="section-title"><span class="badge badge-header">HEADER</span> 算法与类型</div>';
html+='<div class="json-box">'+esc(hFmt)+'</div></div>';

html+='<div class="section"><div class="section-title"><span class="badge badge-payload">PAYLOAD</span> 数据</div>';
html+='<div class="json-box">'+esc(pFmt)+'</div></div>';

var pObj;
try{pObj=JSON.parse(payload);}catch(e){pObj=null;}

if(pObj){
html+='<div class="section"><div class="section-title">📋 Claims 摘要</div>';
var claims=[];
if(pObj.iss) claims.push({k:'iss',v:pObj.iss,d:'签发者 (Issuer)'});
if(pObj.sub) claims.push({k:'sub',v:pObj.sub,d:'主题 (Subject)'});
if(pObj.aud) claims.push({k:'aud',v:pObj.aud,d:'受众 (Audience)'});
if(pObj.exp) claims.push({k:'exp',v:pObj.exp,d:'过期时间 (Expiration)',ts:true});
if(pObj.nbf) claims.push({k:'nbf',v:pObj.nbf,d:'生效时间 (Not Before)',ts:true});
if(pObj.iat) claims.push({k:'iat',v:pObj.iat,d:'签发时间 (Issued At)',ts:true});
if(pObj.jti) claims.push({k:'jti',v:pObj.jti,d:'JWT ID'});

var now=Math.floor(Date.now()/1000);
if(pObj.exp){
	var expDate=new Date(pObj.exp*1000);
	var expired=now>pObj.exp;
	if(expired)html+='<div style="margin-top:8px;"><span class="status-badge status-expired">⚠ 已过期 · '+expDate.toLocaleString('zh-CN')+'</span></div>';
	else{
		var remain=pObj.exp-now;
		var remainStr='';
		if(remain<60)remainStr=remain+'秒';
		else if(remain<3600)remainStr=Math.floor(remain/60)+'分钟';
		else if(remain<86400)remainStr=Math.floor(remain/3600)+'小时';
		else remainStr=Math.floor(remain/86400)+'天';
		html+='<div style="margin-top:8px;"><span class="status-badge status-valid">✅ 有效 · 剩余'+remainStr+' · '+expDate.toLocaleString('zh-CN')+'</span></div>';
	}
}

claims.forEach(function(c){
	html+='<div class="claim-row"><span><span class="key">'+c.k+'</span> <span style="color:var(--text2);font-size:11px;">'+c.d+'</span></span>';
	if(c.ts)html+='<span class="val">'+new Date(c.v*1000).toLocaleString('zh-CN')+' <span style="color:var(--text2);font-size:11px;">('+c.v+')</span></span>';
	else html+='<span class="val">'+esc(String(c.v))+'</span>';
	html+='</div>';
});
html+='</div>';
}

html+='<div class="section"><div class="section-title"><span class="badge badge-sig">SIGNATURE</span> 签名</div>';
html+='<div class="json-box" style="word-break:break-all;">'+esc(sig)+'</div></div>';

out.innerHTML=html;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
