<header class="header"><a href="/toolbox-pro/" class="logo">🔧 ToolBox Pro</a><a href="/toolbox-pro/" class="back">← 返回工具箱</a></header>
<div class="container">

<div class="hero"><h1>在线文本差异对比</h1><p>逐行对比两段文本，高亮显示新增、删除和相同内容。代码Review、文档版本对比的必备工具。</p></div>
<div class="editor-wrap">
<div><div class="pane-label">原始文本</div><textarea id="oldText" placeholder="粘贴原始文本..."></textarea></div>
<div><div class="pane-label">新文本</div><textarea id="newText" placeholder="粘贴新文本..."></textarea></div>
</div>

<button class="btn btn-primary" onclick="diff()">对比差异</button>
<button class="btn btn-secondary" onclick="document.getElementById('oldText').value='';document.getElementById('newText').value='';document.getElementById('diffOut').innerHTML='';">清空</button>
</div>

<script>
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function diff(){
var o=document.getElementById('oldText').value,n=document.getElementById('newText').value;
var out=document.getElementById('diffOut');
if(!o&&!n){out.innerHTML='';return;}
var ol=o.split('\n'),nl=n.split('\n');
var m=ol.length,N=nl.length;
var dp=Array.from({length:m+1},function(){return Array(N+1).fill(0);});
for(var i=1;i<=m;i++)for(var j=1;j<=N;j++)dp[i][j]=ol[i-1]===nl[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
var res=[],i=m,j=N,st=[];
while(i>0||j>0){
if(i>0&&j>0&&ol[i-1]===nl[j-1]){st.push({t:'same',v:ol[i-1]});i--;j--;}
else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){st.push({t:'add',v:nl[j-1]});j--;}
else{st.push({t:'del',v:ol[i-1]});i--;}
}
while(st.length)res.push(st.pop());
var h='';
res.forEach(function(l){if(l.t==='add')h+='<div class="diff-line diff-add">+ '+esc(l.v)+'</div>';else if(l.t==='del')h+='<div class="diff-line diff-del">- '+esc(l.v)+'</div>';else h+='<div class="diff-line diff-same">  '+esc(l.v)+'</div>';});
out.innerHTML=h;
}
</script>
