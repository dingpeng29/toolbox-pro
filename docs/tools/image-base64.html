<div class="hero"><h1>图片 ⇄ Base64 转换</h1><p>将图片文件转换为Base64编码字符串，或将Base64字符串还原为图片。支持PNG/JPG/GIF/WebP等格式，纯浏览器本地处理。</p></div>

<script>
function show(t,m){var d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove();},2000);}
function img2b64(){
var f=document.getElementById('imgFile').files[0];if(!f)return;
if(f.size>10*1024*1024){show('error','图片大小不能超过10MB');return;}
var r=new FileReader();
r.onload=function(e){
document.getElementById('b64Out').textContent=e.target.result;
document.getElementById('imgPreview').innerHTML='<img src="'+e.target.result+'" style="max-width:100%;max-height:200px;border-radius:8px;"><p style="font-size:12px;color:var(--text2);margin-top:4px;">'+f.name+' ('+(f.size/1024).toFixed(1)+' KB)</p>';
show('success','转换成功');
};
r.onerror=function(){show('error','文件读取失败');};
r.readAsDataURL(f);
}
function b642img(){
var s=document.getElementById('b64In').value.trim();if(!s){show('error','请输入Base64编码');return;}
var img=document.createElement('img');
img.onload=function(){document.getElementById('b64Preview').innerHTML='';document.getElementById('b64Preview').appendChild(img);img.style.maxWidth='100%';img.style.maxHeight='200px';img.style.borderRadius='8px';};
img.onerror=function(){document.getElementById('b64Preview').innerHTML='<p style="color:var(--red);">无法解析Base64图片</p>';};
img.src=s.startsWith('data:')?s:'data:image/png;base64,'+s;
}
</script>
