<script>
const wcInput=document.getElementById('wcInput');
wcInput.addEventListener('input',function(){
const text=this.value;
const chars=text.length;
const charsNoSpace=text.replace(/\s/g,'').length;
const cnChars=(text.match(/[一-鿿㐀-䶿]/g)||[]).length;
const enWords=text.match(/[a-zA-Z]+/g)||[];
const totalWords=cnChars+enWords.length;
const lines=text?text.split('\n').length:0;
const paras=text?text.split('\n').filter(l=>l.trim()).length:0;
const bytes=new TextEncoder().encode(text).length;
document.getElementById('wcStats').innerHTML=
'<div class="stat"><div class="num">'+totalWords+'</div><div class="label">总字数（中+英）</div></div>'+
'<div class="stat"><div class="num">'+chars+'</div><div class="label">总字符数</div></div>'+
'<div class="stat"><div class="num">'+charsNoSpace+'</div><div class="label">字符数（不含空格）</div></div>'+
'<div class="stat"><div class="num">'+cnChars+'</div><div class="label">中文字数</div></div>'+
'<div class="stat"><div class="num">'+enWords.length+'</div><div class="label">英文单词数</div></div>'+
'<div class="stat"><div class="num">'+lines+'</div><div class="label">行数</div></div>'+
'<div class="stat"><div class="num">'+paras+'</div><div class="label">段落数</div></div>'+
'<div class="stat"><div class="num">'+bytes+'</div><div class="label">字节数（UTF-8）</div></div>';
});
wcInput.dispatchEvent(new Event('input'));
</script>
