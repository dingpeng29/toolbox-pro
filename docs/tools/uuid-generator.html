<script>
function show(t,m){var d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove();},2000);}
function makeV4(){
if(crypto.randomUUID)return crypto.randomUUID();
var b=new Uint8Array(16);crypto.getRandomValues(b);
b[6]=(b[6]&0x0f)|0x40;b[8]=(b[8]&0x3f)|0x80;
return Array.from(b,function(x){return x.toString(16).padStart(2,'0');}).join('').replace(/(.{8})(.{4})(.{4})(.{4})(.{12})/,'$1-$2-$3-$4-$5');
}
function makeV7(){
var ms=BigInt(Date.now());var r=new Uint8Array(10);crypto.getRandomValues(r);
var ra=BigInt('0x'+Array.from(r.slice(0,6)).map(function(b){return b.toString(16).padStart(2,'0');}).join(''));
var rb=BigInt('0x'+Array.from(r.slice(6)).map(function(b){return b.toString(16).padStart(2,'0');}).join(''));
var uuid=(ms<<80n)|((ra<<16n)&0x3FFFn)|(0x7000n<<48n)|((rb&0x3FFFFFFFFFFFFFFFn)|0x8000000000000000n);
var hex=uuid.toString(16).padStart(32,'0');
return hex.slice(0,8)+'-'+hex.slice(8,12)+'-7'+hex.slice(13,16)+'-'+hex.slice(16,20)+'-'+hex.slice(20);
}
function display(uuids){
var h='';for(var i=0;i<uuids.length;i++){h+='<div class="uuid-item" onclick="copy(\''+uuids[i]+'\')">'+uuids[i]+'</div>';}
document.getElementById('uuidOut').innerHTML=h;
}
function genV4(){display([makeV4()]);}
function genV7(){display([makeV7()]);}
function genBatch(n){var u=[];for(var i=0;i<n;i++)u.push(makeV4());display(u);}
function copy(t){navigator.clipboard.writeText(t).then(function(){show('success','已复制');});}
</script>
