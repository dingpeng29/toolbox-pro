<div class="card">
<div class="inline-row">
<input type="text" id="rePattern" placeholder="正则表达式，如 \d{4}-\d{2}-\d{2}">
<input type="text" id="reFlags" placeholder="标志，如 gi">
</div>
<textarea id="reInput" placeholder="输入测试文本..."></textarea>
<button class="btn btn-primary" onclick="test()" style="margin-top:8px;">测试匹配</button>
<div class="result-box" id="reOutput"></div>
<p style="font-size:12px;color:var(--text2);margin-top:8px;">常用正则：邮箱 \w+@\w+\.\w+ | 手机号 1[3-9]\d{9} | URL https?://[\w./-]+ | 中文 [一-龥]</p>

<script>
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function test(){
var p=document.getElementById('rePattern').value;
var f=document.getElementById('reFlags').value;
var t=document.getElementById('reInput').value;
var o=document.getElementById('reOutput');
if(!p){o.textContent='请输入正则表达式';return;}
try{
var re=new RegExp(p,f);
var m=[...t.matchAll(re)];
if(m.length===0){o.innerHTML='<span style="color:var(--text2);">没有匹配结果</span>';return;}
var h='<p style="margin-bottom:8px;">找到 <strong>'+m.length+'</strong> 个匹配:</p>';
m.forEach(function(match,i){
h+='<div class="match-item"><span class="pos">#'+(i+1)+(match.index!==undefined?' 位置:'+match.index:'')+' </span><code>'+esc(match[0])+'</code>';
if(match.groups)h+=' <span class="group">具名组: '+JSON.stringify(match.groups)+'</span>';
for(var j=1;j<match.length;j++){
if(match[j]!==undefined)h+=' <span class="group">$'+j+': '+esc(match[j])+'</span>';
}
h+='</div>';
});
o.innerHTML=h;
}catch(e){o.innerHTML='<span style="color:var(--red);">正则表达式错误: '+e.message+'</span>';}
}
</script>
