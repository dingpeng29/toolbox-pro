<script>
var words=['lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','ut','aliquip','ex','ea','commodo','consequat','duis','aute','irure','dolor','in','reprehenderit','in','voluptate','velit','esse','cillum','dolore','eu','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','in','culpa','qui','officia','deserunt','mollit','anim','id','est','laborum'];
var currentText='';
function gen(){
var count=parseInt(document.getElementById('loremCount').value)||3;
var sent=parseInt(document.getElementById('loremSent').value)||5;
var start=document.getElementById('loremStart').checked;
var paras=[];
for(var p=0;p<count;p++){
var text=[];
var numWords=sent*(6+Math.floor(Math.random()*10));
for(var i=0;i<numWords;i++)text.push(words[Math.floor(Math.random()*words.length)]);
var result='',wi=0;
for(var s=0;s<sent;s++){
var sw=Math.floor(text.length/sent)+Math.floor(Math.random()*3);
for(var w=0;w<sw&&wi<text.length;w++){var word=text[wi];result+=(w===0?word.charAt(0).toUpperCase()+word.slice(1):word);if(w<sw-1)result+=' ';wi++;}
result+='. ';
}
paras.push(result.trim());
}
if(start&&paras.length>0)paras[0]='Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. '+paras[0];
currentText=paras.join('\n\n');
document.getElementById('loremOut').textContent=currentText;
}
function copy(){
if(!currentText){gen();}
navigator.clipboard.writeText(currentText||document.getElementById('loremOut').textContent).then(function(){
var t=document.createElement('div');t.className='toast success';t.textContent='已复制到剪贴板';document.body.appendChild(t);setTimeout(function(){t.remove();},2000);
});
}
