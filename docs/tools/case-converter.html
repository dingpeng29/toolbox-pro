<script>
function show(t,m){var d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove();},2000);}
function conv(type){
var s=document.getElementById('caseIn').value;if(!s)return;
var r='';
switch(type){
case'upper':r=s.toUpperCase();break;
case'lower':r=s.toLowerCase();break;
case'title':r=s.replace(/\b\w/g,function(c){return c.toUpperCase();});break;
case'sentence':r=s.charAt(0).toUpperCase()+s.slice(1).toLowerCase();r=r.replace(/([.!?]\s+)([a-z])/g,function(_,p,c){return p+c.toUpperCase();});break;
case'invert':r=s.split('').map(function(c){return c===c.toUpperCase()?c.toLowerCase():c.toUpperCase();}).join('');break;
case'camel':r=s.replace(/[^a-zA-Z0-9]+(.)/g,function(_,c){return c.toUpperCase();});r=r.charAt(0).toLowerCase()+r.slice(1);break;
case'snake':r=s.replace(/([A-Z])/g,'_$1').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');break;
case'kebab':r=s.replace(/([A-Z])/g,'-$1').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');break;
}
document.getElementById('caseOut').textContent=r;
}
</script>
